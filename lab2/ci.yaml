name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright
          playwright install chromium
      
      - name: Prepare configs
        run: |
          sudo mkdir -p /opt/catty-reminders
          [ -f config.json ] && sudo cp config.json /opt/catty-reminders/ || true
          [ -f inputs.json ] && sudo cp inputs.json /opt/catty-reminders/ || true
      
      - name: Run application
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 10
          curl -s http://localhost:8181/login | head -5
      
      - name: Execute tests
        run: |
          python -m pytest tests/ -v --junitxml=test_results.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_results.xml
