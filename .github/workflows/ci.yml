name: CI
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
jobs:
# Описание конкретной задачи, одна задача - main-build
  main-build:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Копирование кода из репозитория внутрь виртуальной машины раннера
      - uses: actions/checkout@v4
      # Шаг 2: Подготовка окружения Python нужной версии
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Шаг 3: Установка библиотек, необходимых для работы приложения и тестов
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn pytest-playwright
          playwright install --with-deps chromium

       # Шаг 4: Запуск приложения в фоновом режиме
      - name: Start app
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 10
      # Шаг 5: Запуск автоматических тестов
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Запускаем pytest и сохраняем отчет в формате XML
        # ' true' гарантирует, что пайплайн не прервется даже при падении тестов (нужно для выгрузки отчета)
        run: pytest --junitxml=test_result.xml || true

       # Шаг 6: Сохранение результатов теста в артефакты GitHub
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: test_result.xml
