name: CI Workflow
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Устанавливаем playwright и сам браузер chromium
          pip install pytest-playwright
          playwright install --with-deps chromium

      - name: Run Tests
        shell: bash
        run: |
          # Чтобы python видел папку app
          export PYTHONPATH=$PYTHONPATH:.
          # Запускаем все тесты из папки tests
          # Используем || true, чтобы артефакт загрузился даже если тесты упадут
          python3 -m pytest tests/ > test_result.txt 2>&1 || true
          # Показываем лог в консоли GitHub
          cat test_result.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.txt
