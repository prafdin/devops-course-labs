name: Continuous Integration

on:
  push:
    branches: [ "lab3*" ]
  pull_request:
    branches: [ "lab3*" ]

jobs:
  code-quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Python Environment Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependency Installation
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Execution of Tests
        env:
          PYTHONPATH: .
        run: pytest tests/ --junitxml=results.xml

      - name: Test Report Archiving
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: results.xml

  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: Dockerfile

  docker-build-and-push:
    needs: code-quality-and-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:latest
