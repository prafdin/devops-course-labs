name: Python CI

on:
  push:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-playwright

    - name: Install Playwright browsers
      run: playwright install

    - name: Start FastAPI server
      run: |
        uvicorn app.main:app --host 0.0.0.0 --port 8181 &
        sleep 5

    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$PWD
        pytest tests/test_unit.py --junitxml=test_result.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test_result
        path: test_result.xml
        retention-days: 7

  build-docker:
      needs: test
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v3

        - name: Login to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.DOCKER_PAT }}

        - name: Build and push Docker image
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: |
              ghcr.io/andreypreobrazhenskiy/catty-reminders-app:${{ github.sha }}
              ghcr.io/andreypreobrazhenskiy/catty-reminders-app:latest
            build-args: |
              DEPLOY_REF=${{ github.sha }}
