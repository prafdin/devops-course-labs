name: CI

on:
  push:
    branches:
      - lab4
      - 'lab4_autotests*'
    tags:
      - 'v*'
      - 'ci-*'
  pull_request:
    branches:
      - lab4
      - 'lab4_autotests*'

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare env
        run: |
          echo "IMAGE_TAG=lab4" > .env
          echo "DEPLOY_REF=ci-test" >> .env

      - name: Start app via Docker Compose
        run: |
          docker compose up -d --build
          sleep 15

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

      - name: Stop compose stack
        if: always()
        run: docker compose down

  docker:
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/artem362a/catty-reminders-app:${{ github.sha }}
            ghcr.io/artem362a/catty-reminders-app:${{ github.ref_name }}
