name: CI

on:
  push:
    branches: [lab4, lab4*]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
	  pip install playwright
          playwright install chromium
          
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Run unit tests and save results
        run: |
          mkdir -p test_results
          pytest tests/ -v --tb=short > test_results/output.txt 2>&1
          echo $? > test_results/exit_code.txt
          cp test_results/output.txt test_results/test_result.txt
        continue-on-error: true
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_results/
          if-no-files-found: error

      - name: Check if tests passed
        run: |
          exit_code=$(cat test_results/exit_code.txt)
          if [ "$exit_code" -ne 0 ]; then
            echo "Tests failed with exit code $exit_code"
            exit 1
          else
            echo "All tests passed!"
          fi

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/mappy12/catty-reminders-app:lab4
            ghcr.io/mappy12/catty-reminders-app:${{ github.sha }}
