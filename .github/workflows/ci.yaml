name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Setup test environment
        run: |
          sudo mkdir -p /opt/catty-reminders
          sudo cp config.json /opt/catty-reminders/
          sudo cp inputs.json /opt/catty-reminders/
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tee test_result.txt
          grep -q "PASSED" test_result.txt || exit 1
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.txt
