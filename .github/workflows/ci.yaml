name: CI
on:
  push:
    branches: [ lab4* ]
  pull_request:
    branches: [ lab4* ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          # Пароль как в config.json
          MYSQL_ROOT_PASSWORD: mypass
          MYSQL_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-playwright uvicorn
          playwright install --with-deps chromium

      - name: Initialize Database Tables
        run: |
          # Приложение само создает таблицы через MySQLStorage.__init__, 
          # но мы убедимся, что база reminders существует
          docker exec ${{ job.services.mysql.id }} mysql -u root -pmypass -e "CREATE DATABASE IF NOT EXISTS catty_reminders;"

      - name: Start app
        env:
          PYTHONPATH: ${{ github.workspace }}
          # DATABASE_URL твое приложение игнорирует, оно читает config.json
          # Но мы оставляем PYTHONPATH, чтобы тесты видели модули
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > app_debug.log 2>&1 &
          sleep 10

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Запускаем тесты. Если 500 ошибка повторится - выведем реальный лог
          pytest --junitxml=test_result.xml || (echo "CRITICAL: App Logs below:" && cat app_debug.log && exit 1)

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker-build:
    needs: pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Image Name
        id: prep
        run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
