name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Setup config files
        run: |
          sudo mkdir -p /opt/catty-reminders
          if [ -f config.json ]; then
            sudo cp config.json /opt/catty-reminders/
          else
            echo '{"db_path": "reminder_db.json", "secret_key": "test", "users": {}}' | sudo tee /opt/catty-reminders/config.json
          fi
          if [ -f inputs.json ]; then
            sudo cp inputs.json /opt/catty-reminders/
          else
            echo '{"base_url": "http://localhost:8181", "users": [{"username": "test", "password": "test"}]}' | sudo tee /opt/catty-reminders/inputs.json
          fi
      
      - name: Run tests
        run: |
          python -m pytest tests/ --junitxml=test_results.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_results.xml
