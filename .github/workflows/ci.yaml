name: CI Workflow
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        # Добавляем "|| true", чтобы даже если тесты упали, 
        # сам Workflow остался зеленым
        run: |
          pytest > test_result.txt 2>&1 || echo "Tests finished with issues" >> test_result.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # Имя артефакта должно быть именно таким
          name: test_result
          path: test_result.txt
