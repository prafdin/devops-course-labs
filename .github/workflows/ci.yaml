name: CI Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-playwright uvicorn
          playwright install chromium --with-deps
      
      - name: Prepare configs
        run: |
          sudo mkdir -p /opt/catty-reminders
          [ -f config.json ] && sudo cp config.json /opt/catty-reminders/ || true
          [ -f inputs.json ] && sudo cp inputs.json /opt/catty-reminders/ || true
      
      - name: Run application
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 10
          curl -s http://localhost:8181/login | head -n 5
      
      - name: Execute tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest tests/ -v --junitxml=test_results.xml > test_result.txt 2>&1 || true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: |
            test_results.xml
            test_result.txt

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}