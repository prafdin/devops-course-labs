name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright playwright uvicorn
          python -m playwright install chromium --with-deps

      - name: Prepare inputs.json
        run: |
          echo '{"base_url": "http://127.0.0.1:8181", "users": [{"username": "simonov", "password": "password"}]}' > inputs.json

      - name: Start app in background
        run: |
          # Запускаем uvicorn, передавая PYTHONPATH, чтобы он видел папку app
          PYTHONPATH=. nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 10 # Даем больше времени на запуск

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Запускаем pytest строго по папке tests/
        # Генерируем XML и текстовый лог одновременно
        run: |
          mkdir -p output
          pytest tests/ -v --junitxml=output/test_result.xml > output/test_result 2>&1 || true
          # Копируем XML в корень папки артефакта для надежности
          cp output/test_result.xml output/test_result.xml.backup 

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          # Загружаем содержимое папки output. 
          # По идее бот найдет там и test_result (текст), и test_result.xml
          path: output/
