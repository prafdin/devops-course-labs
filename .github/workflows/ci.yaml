name: CI Workflow
on:
  push:
    branches: ["**"] 
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-playwright uvicorn # Ставим uvicorn для запуска
          playwright install --with-deps chromium

      - name: Prepare Config
        # Твой conftest.py ищет inputs.json. Создаем его, чтобы не было ошибки.
        run: |
          echo '{"base_url": "http://127.0.0.1:8181", "users": [{"username": "ilya", "password": "password"}]}' > inputs.json

      - name: Launch Application
        # Запускаем Catty в фоне прямо в GitHub Actions
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5 # Даем время серверу проснуться

      - name: Execute Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Генерируем JUnit XML отчет
        run: pytest --junitxml=report.xml || true

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Имя артефакта СТРОГО 'test_result'
          name: test_result
          # Путь к нашему XML отчету
          path: report.xml
