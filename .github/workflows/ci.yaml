name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-playwright

      - name: Run server and tests
        run: |
          # Указываем, где искать пакеты
          export PYTHONPATH=$(pwd)/app
          # Запуск uvicorn сервера в фоне
          uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          SERVER_PID=$!
          sleep 5  # ждём, пока сервер полностью поднимется
          # Запуск тестов
          pytest --junitxml=test_result.xml
          # Останавливаем сервер
          kill $SERVER_PID

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
