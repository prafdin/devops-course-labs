name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright playwright uvicorn
          python -m playwright install chromium --with-deps

      - name: Prepare inputs.json
        run: |
          echo '{"base_url": "http://127.0.0.1:8181", "users": [{"username": "simonov", "password": "password"}]}' > inputs.json

      - name: Start app
        run: |
          PYTHONPATH=. nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 10

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Пробуем создать прямо в корне рабочей директории, без папки output
        run: |
          pytest tests/ -v --junitxml=test_result.xml > test_result 2>&1 || true

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: |
            test_result
            test_result.xml
