name: CI Workflow
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Dummy Test
        run: echo "CI Passed" > test_result.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.txt
