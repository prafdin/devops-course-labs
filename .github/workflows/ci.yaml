name: CI Workflow

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root_pass
          MARIADB_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Start Application in background
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: mysql+pymysql://user:password@127.0.0.1:3306/catty_reminders

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: mysql+pymysql://user:password@127.0.0.1:3306/catty_reminders
        run: pytest --junitxml=test_result.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  build-and-push-docker:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Run Hadolint
          uses: hadolint/hadolint-action@v3.1.0
          with:
            dockerfile: Dockerfile
          continue-on-error: true 

        - name: Log in to GitHub Container Registry
          if: github.event_name != 'pull_request'
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }} 

        - name: Extract metadata for Docker
          id: meta
          uses: docker/metadata-action@v6
          with:
            images: ghcr.io/yui1337/catty-reminders-app
            tags: |
              type=ref,event=branch
              type=raw,value=${{ github.sha }}
              
        - name: Build and push Docker image
          uses: docker/build-push-action@v6
          with:
            context: .
            push: ${{ github.event_name != 'pull_request' }}
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
