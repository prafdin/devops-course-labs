name: CI Workflow
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Устанавливаем браузер для UI тестов
          pip install pytest-playwright
          playwright install --with-deps chromium

      - name: Run Tests
        shell: bash
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # 1. Убираем расширение .txt у файла
          # 2. Добавляем -W ignore, чтобы убрать варнинги из файла (сделаем отчет чище)
          # 3. Убираем || true, чтобы ты видел реальный статус в Actions. 
          # Если упадет — значит в CI тест не проходит.
          python3 -m pytest -W ignore tests/ > test_result 2>&1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always() # Загружаем отчет даже если тесты упали, чтобы можно его почитать
        with:
          name: test_result
          path: test_result # Путь к файлу без .txt
