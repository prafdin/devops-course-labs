name: CI
on:
  push:
    branches: [ lab4* ]
  pull_request:
    branches: [ lab4* ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-playwright uvicorn
          playwright install --with-deps chromium

      - name: Start Database (MySQL)
        run: |
          # Запускаем MySQL контейнер
          docker run -d --name db \
            -p 3306:3306 \
            -e MYSQL_ROOT_PASSWORD=password \
            -e MYSQL_DATABASE=reminders \
            -e MYSQL_USER=user \
            -e MYSQL_PASSWORD=password \
            mysql:8.0
          # MySQL 8.0 инициализируется долго (создает системные таблицы), ждем 30 сек
          sleep 30

      - name: Start App (Background)
        env:
          # Приложение на хосте подключается к Docker-базе через 127.0.0.1:3306
          DATABASE_URL: mysql+mysqlconnector://user:password@127.0.0.1:3306/reminders
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Запускаем uvicorn и пишем логи в файл для отладки ошибок 500
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > app_log.txt 2>&1 &
          sleep 10

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Если pytest упадет, выводим логи приложения, чтобы увидеть причину ошибки 500
          pytest --junitxml=test_result.xml || (echo "--- APP LOGS ---" && cat app_log.txt && exit 1)

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Prepare Image Name
        id: prep
        run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
