name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-playwright uvicorn
          playwright install --with-deps chromium

      - name: Create inputs.json
        # Это нужно тестам (conftest.py), чтобы они не падали
        run: |
          echo '{"base_url": "http://127.0.0.1:8181", "users": [{"username": "ilya", "password": "password"}]}' > inputs.json

      - name: Start Application
        # Запускаем сервер, чтобы тесты могли к нему подключиться
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p test_reports
          # Генерируем и XML, и текстовый отчет
          pytest --junitxml=test_reports/junit.xml > test_reports/test_result 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Имя артефакта строго по инструкции
          name: test_result
          # Загружаем всю папку, чтобы бот точно нашел нужный ему файл внутри
          path: test_reports/
