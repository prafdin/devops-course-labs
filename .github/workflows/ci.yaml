name: CI

on:
  push:
    branches: [lab4, lab4*]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright uvicorn
          playwright install chromium

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Initialize database
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          sleep 5
          mysql -h 127.0.0.1 -u root -prootpass catty_reminders -e "
            CREATE TABLE IF NOT EXISTS users (
              id INT AUTO_INCREMENT PRIMARY KEY,
              username VARCHAR(255) NOT NULL UNIQUE,
              password VARCHAR(255) NOT NULL
            );
            CREATE TABLE IF NOT EXISTS reminder_lists (
              id INT AUTO_INCREMENT PRIMARY KEY,
              owner VARCHAR(255) NOT NULL,
              name VARCHAR(255) NOT NULL
            );
            CREATE TABLE IF NOT EXISTS reminder_items (
              id INT AUTO_INCREMENT PRIMARY KEY,
              list_id INTEGER NOT NULL,
              description TEXT NOT NULL,
              completed BOOLEAN DEFAULT FALSE
            );
            CREATE TABLE IF NOT EXISTS selected_lists (
              owner VARCHAR(255) PRIMARY KEY,
              list_id INTEGER NOT NULL
            );
            INSERT INTO users (username, password) VALUES ('tester', 'foobar123') ON DUPLICATE KEY UPDATE username=username;
          "

      - name: Start application in background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 5
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests and save results
        run: |
          mkdir -p test_results
          pytest tests/test_unit.py -v --tb=short --junit-xml=test_results/junit.xml > test_results/output.txt 2>&1
          exit_code=$?
          echo $exit_code > test_results/exit_code.txt
          echo "Test run completed with exit code: $exit_code"
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_results/
          if-no-files-found: error

      - name: Check if tests passed
        run: |
          if [ ! -f test_results/exit_code.txt ]; then
            echo "❌ exit_code.txt not found!"
            exit 1
          fi
          exit_code=$(cat test_results/exit_code.txt)
          if [ "$exit_code" -ne 0 ]; then
            echo "❌ Tests failed with exit code $exit_code"
            cat test_results/output.txt
            exit 1
          else
            echo "✅ All tests passed!"
          fi

  build:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/mappy12/catty-reminders-app:lab4
            ghcr.io/mappy12/catty-reminders-app:${{ github.sha }}