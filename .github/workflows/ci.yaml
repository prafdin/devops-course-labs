name: CI Pipeline
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: reminders
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest mysql-connector-python
          playwright install chromium
      - name: Run app in background
        run: |
          export PYTHONPATH=.
          export DATABASE_URL=mysql+mysqlconnector://root:password@127.0.0.1:3306/reminders
          nohup uvicorn app.main:app --port 8181 > app.log 2>&1 &
          sleep 5
      - name: Run tests
        run: |
          export PYTHONPATH=.
          export DATABASE_URL=mysql+mysqlconnector://root:password@127.0.0.1:3306/reminders
          # Запускаем тесты и не даем им "уронить" весь пайплайн, 
          # чтобы бот в любом случае получил файл results.xml
          pytest --junitxml=results.xml || echo "Tests failed, but XML generated"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: results.xml
