name: CI

on:
  push:
    branches: [lab4, lab4*]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Create correct config.json for tests
        run: |
          cat > config.json << 'EOF'
          {
              "users": [
                  {"username": "tester", "password": "foobar123"}
              ],
              "db_config": {
                  "host": "localhost",
                  "port": 5432,
                  "user": "postgres",
                  "password": "postgres",
                  "database": "catty"
              },
              "db_path": "reminder_db.json",
              "secret_key": "Cats are awesome!"
          }
          EOF
          cat config.json

      - name: Start application in background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 5
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests and save results
        run: |
          mkdir -p test_results
          pytest tests/ -v --tb=short --junit-xml=test_results/junit.xml > test_results/output.txt 2>&1
          exit_code=$?
          echo $exit_code > test_results/exit_code.txt
          echo "Test run completed with exit code: $exit_code"
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_results/
          if-no-files-found: error

      - name: Check if tests passed
        run: |
          if [ ! -f test_results/exit_code.txt ]; then
            echo "❌ exit_code.txt not found!"
            exit 1
          fi
          exit_code=$(cat test_results/exit_code.txt)
          if [ "$exit_code" -ne 0 ]; then
            echo "❌ Tests failed with exit code $exit_code"
            cat test_results/output.txt
            exit 1
          else
            echo "✅ All tests passed!"
          fi

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/mappy12/catty-reminders-app:lab4
            ghcr.io/mappy12/catty-reminders-app:${{ github.sha }}
