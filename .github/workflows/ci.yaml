name: CI Workflow
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright
          playwright install --with-deps chromium

      - name: Run Tests
        run: |
          # Создаем заглушку inputs.json, чтобы conftest.py не падал
          if [ ! -f inputs.json ]; then
            echo '{"base_url": "http://localhost:8181", "users": [{"username": "ilya", "password": "password"}]}' > inputs.json
          fi

          # Сохраняем в файл 'test_result' без расширения .txt
          # Добавляем --color=no, чтобы в файле не было лишних спецсимволов
          PYTHONPATH=. pytest --color=no --disable-warnings -v > test_result 2>&1 || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # Имя артефакта остается 'test_result'
          name: test_result
          # Путь теперь ведет к файлу без расширения
          path: test_result
