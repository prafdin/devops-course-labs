name: CI

on:
  push:
    branches:
      - lab2
      - lab2_autotests*
  pull_request:
    branches:
      - lab2
      - lab2_autotests*
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install pytest pytest-cov playwright

      - name: 🌐 Install Playwright browsers
        run: playwright install --with-deps

      - name: 🔧 Create deploy ref file
        run: |
          # Создаем файл с текущим SHA коммита
          echo "DEPLOY_REF=${{ github.sha }}" | sudo tee /tmp/deploy_ref.txt > /dev/null
          echo "Created deploy_ref.txt with SHA: ${{ github.sha }}"

      - name: 🚀 Launch FastAPI in background
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8181 > server.log 2>&1 &
          echo "Waiting for server..."
          for i in {1..30}; do
            curl -s http://localhost:8181/login && break || sleep 2
          done

      - name: Execute tests
        env:
           PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml

      - name: 📤 Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_result.xml
