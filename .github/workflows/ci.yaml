name: CI

on:
  push:
    branches: [lab-4, lab-4*]
  pull_request:
    branches: [lab-4, lab-4*]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint hadolint - < Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      db:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: rootpass
          MARIADB_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn pytest-playwright
          playwright install --with-deps chromium

      - name: Configure config.json for CI
        run: |
          sed -i 's/"host": "db"/"host": "127.0.0.1"/g' config.json
          cat config.json | grep -A 5 "db_config"

      - name: Start application
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/test_unit.py -v --junitxml=test_result.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: success() && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:latest
          provenance: false
