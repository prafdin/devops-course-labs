name: CI

# Триггеры запуска: при пуше в ветки lab3* или создании PR в lab3*
on:
  push:
    branches: [ lab3* ]
  pull_request:
    branches: [ lab3* ]

jobs:
  # JOB 1: Запуск тестов
  tests:
    runs-on: ubuntu-latest
    steps:
      # Клонируем репозиторий
      - uses: actions/checkout@v4

      # Устанавливаем Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Устанавливаем зависимости и Playwright
      - name: Install deps
        run: |
          pip install -r requirements.txt pytest-playwright
          playwright install --with-deps chromium

      # Запускаем приложение в фоне
      - name: Start App
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5

      # Запускаем тесты с генерацией XML отчета
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml

      # Загружаем отчет о тестах как артефакт (всегда, даже если тесты упали)
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  # JOB 2: Сборка и пуш Docker образа (зависит от успешных тестов)
  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    # Запускаем только при пуше (не при PR)
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write  # Нужно для пуша в GitHub Container Registry

    steps:
      - uses: actions/checkout@v4

      # Приводим имя репозитория к нижнему регистру (Docker не принимает заглавные)
      - name: Prepare Image Name
        id: prep
        run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Логинимся в GitHub Container Registry (GHCR)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Собираем образ и пушим с двумя тегами: latest и SHA коммита
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .                    # Контекст сборки — корень репозитория
          push: true                   # Пушим в registry
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
