name: CI Workflow
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Tests
        # Мы запускаем pytest и сохраняем ВЕСЬ его вывод в файл test_result
        run: pytest > test_result
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result
