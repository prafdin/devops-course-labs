name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xml
      
      - name: Create test file
        run: |
          mkdir -p tests
          cat > tests/test_simple.py << 'INNEREOF'
          import pytest
          
          def test_python_version():
              import sys
              assert sys.version_info.major >= 3
          
          def test_import_fastapi():
              import fastapi
              assert fastapi.__version__ is not None
          
          def test_import_uvicorn():
              import uvicorn
              assert uvicorn.__version__ is not None
          INNEREOF
      
      - name: Run tests
        run: |
          pytest tests/ -v --junitxml=test_results.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_results.xml
