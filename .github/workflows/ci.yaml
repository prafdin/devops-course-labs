name: CI

on:
  push:
    branches:
      - lab2
      - lab2_autotests*
  pull_request:
    branches:
      - lab2
      - lab2_autotests*

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Debug - Show files
        run: |
          echo "=== Files in repository ==="
          ls -la
          echo "=== requirements.txt content ==="
          cat requirements.txt || echo "requirements.txt not found!"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Явно устанавливаем критичные пакеты
          pip install fastapi uvicorn pytest pytest-playwright
          playwright install --with-deps chromium

      - name: Debug - Show installed packages
        run: |
          pip list | grep -i fastapi
          pip list | grep -i uvicorn

      - name: Start app
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > app.log 2>&1 &
          sleep 10
          # Проверяем, что приложение запустилось
          curl -I http://127.0.0.1:8181 || echo "App not responding yet"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest --junitxml=test_result.xml -v || echo "Tests completed with exit code $?"

      - name: Show test output
        if: always()
        run: |
          echo "=== Test Result XML ==="
          cat test_result.xml || echo "No test_result.xml found"
          echo "=== Directory listing ==="
          ls -la

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
