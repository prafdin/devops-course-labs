name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright playwright uvicorn
          python -m playwright install chromium --with-deps

      - name: Prepare inputs.json
        #conftest.py требует этот файл. Создаем его, чтобы pytest не упал.
        run: |
          echo '{"base_url": "http://127.0.0.1:8181", "users": [{"username": "ilya", "password": "password"}]}' > inputs.json

      - name: Start app in background
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        # Генерируем XML отчет. Важно: workflow должен завершиться успешно,
        # поэтому используем || true, если вдруг какой-то тест упадет.
        run: pytest -v --junitxml=test_result.xml || true

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Имя артефакта (ZIP-архива)
          name: test_result
          # Путь похоже нужен только к одномуфайлу XML
          path: test_result.xml
