name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Setup config files
        run: |
          sudo mkdir -p /opt/catty-reminders
          sudo cp config.json /opt/catty-reminders/ 2>/dev/null || echo '{"db_path": "reminder_db.json", "secret_key": "test", "users": {}}' | sudo tee /opt/catty-reminders/config.json
          sudo cp inputs.json /opt/catty-reminders/ 2>/dev/null || echo '{"base_url": "http://localhost:8181", "users": [{"username": "test", "password": "test"}]}' | sudo tee /opt/catty-reminders/inputs.json
      
      - name: Start application in background
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 10
          curl -s http://localhost:8181/login | head -10 || echo "App not responding"
      
      - name: Run tests
        run: |
          python -m pytest tests/test_unit.py --junitxml=test_results.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_results.xml
