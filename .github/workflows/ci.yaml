name: CI Workflow
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Устанавливаем всё необходимое для запуска тестов
          pip install pytest pytest-playwright
          # Устанавливаем браузер chromium, который нужен для тестов
          playwright install --with-deps chromium

      - name: Run Tests
        run: |
          # 1. Создаем временный файл inputs.json, так как conftest.py его требует.
          # Если он есть в репозитории - ниего не будет.
          if [ ! -f inputs.json ]; then
            echo '{"base_url": "http://localhost:8181", "users": [{"username": "ilya", "password": "password"}]}' > inputs.json
          fi

          # 2. Запускаем тесты.
          # Добавляем || true, чтобы даже если тесты упадут, бот смог скачать отчет.
          PYTHONPATH=. pytest -v > test_result.txt 2>&1 || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.txt
