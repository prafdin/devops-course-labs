name: CI - Test and Build

on:
  push:
    branches:
      - lab4*
  pull_request:
    branches:
      - lab4*

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        run: |
          docker run --rm -i hadolint/hadolint hadolint - < Dockerfile

  pipeline:
    needs: docker-lint
    if: success()
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mypass
          MYSQL_DATABASE: catty_reminders
          MYSQL_USER: catty_user
          MYSQL_PASSWORD: catty_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pmypass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn pytest-playwright pymysql
          playwright install --with-deps chromium

      - name: Patch config for CI
        run: |
          sed -i 's/"host": "db"/"host": "127.0.0.1"/g' config.json
          cat config.json

      - name: Start app
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 10

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --junitxml=test_result.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: pipeline
    if: success()
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get commit hash
        id: vars
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/timurmif/catty-reminders-app:${{ steps.vars.outputs.commit_hash }}
            ghcr.io/timurmif/catty-reminders-app:latest
