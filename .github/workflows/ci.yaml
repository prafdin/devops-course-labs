name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Run tests
      run: |
        chmod +x test.sh
        ./test.sh

    - name: Upload test result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test_result
        path: test_result.xml
