name: CI Pipeline

on:
  push:
    branches:
      - main
      - 'lab*'
      - 'lab4-clean'
  pull_request:
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        run: docker run --rm -i hadolint/hadolint hadolint - < Dockerfile

  tests:
    needs: docker-lint
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: rootpass123
          MARIADB_DATABASE: catty_db
          MARIADB_USER: catty
          MARIADB_PASSWORD: cattypass123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright
          playwright install --with-deps chromium

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u catty -pcattypass123 --silent; then
              echo "DB ready"; break
            fi
            echo "Waiting for DB... $i"; sleep 2
          done

      - name: Generate test config.json
        run: |
          cat > config.json << 'CFG'
          {
            "secret_key": "Cats are awesome!",
            "users": {
              "heisenberg": "P@ssw0rd",
              "tester": "foobar123"
            },
            "db_config": {
              "host": "127.0.0.1",
              "port": 3306,
              "user": "catty",
              "password": "cattypass123",
              "database": "catty_db"
            }
          }
          CFG

      - name: Start app
        env:
          DEPLOY_REF: ${{ github.sha }}
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > app.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8181/login >/dev/null; then
              echo "App is up"; break
            fi
            echo "Waiting for app... $i"; sleep 2
          done

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v --junitxml=test_result.xml

      - name: Show app log on failure
        if: failure()
        run: cat app.log || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker-build:
    needs: tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh ${{ github.sha }}