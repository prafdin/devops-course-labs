name: CI
on:
  push:
    branches: [ lab4* ]
  pull_request:
    branches: [ lab4* ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          # Флаг --build гарантирует, что папка tests попадет в контейнер
          docker compose up -d --build
          sleep 20

      - name: Run tests
        run: |
          docker compose exec -T app sh -c "PYTHONPATH=. pytest --junitxml=test_result.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Image Name
        id: prep
        run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
