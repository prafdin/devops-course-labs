name: CI Pipeline

on:
  push:
    branches:
      - lab4*
  pull_request:
    branches:
      - lab4*

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        run: |
          docker run --rm -i hadolint/hadolint hadolint - < Dockerfile

  pipeline:
    needs: docker-lint
    if: success()
    runs-on: ubuntu-latest

    services:
      db:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: rootpass123
          MARIADB_DATABASE: catty_db
          MARIADB_USER: catty
          MARIADB_PASSWORD: cattypass123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn pytest-playwright
          playwright install --with-deps chromium

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u catty -pcattypass123 --silent && break
            echo "Waiting for DB... $i"
            sleep 2
          done

      - name: Start app
        env:
          DEPLOY_REF: ${{ github.sha }}
          DB_HOST: 127.0.0.1
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: pipeline
    if: success()
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: self-hosted
    needs: docker-build
    if: success() && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh ${{ github.sha }}
