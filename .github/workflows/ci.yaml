name: CI

on:
  push:
    branches: [lab2]
  pull_request:
    branches: [lab2]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Start app
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5

      - name: Run tests
        run: pytest --junitxml=test_result.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml