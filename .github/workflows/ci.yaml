name: CI - Test and Build

on:
  push:
    branches: [ main, master, develop, lab2 ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Устанавливаем playwright для UI тестов
          pip install playwright
          playwright install chromium --with-deps
      
      - name: Run tests
        run: |
          pytest tests/ -v --junitxml=test_results.xml --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: |
            test_results.xml
            coverage.xml
            htmlcov/
          if-no-files-found: warn
      
      - name: Check application imports
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from app.main import app; print('✅ Application imports successfully')"
