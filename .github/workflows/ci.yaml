name: CI - Test and Build

on:
  push:
    branches: [lab3, main, master]
  pull_request:
    branches: [lab3, main, master]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install playwright
          playwright install chromium --with-deps
      
      - name: Start FastAPI server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 5
      
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$PWD
          pytest tests/ -v --junitxml=test_results.xml --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: |
            test_results.xml
            coverage.xml
            htmlcov/
          if-no-files-found: warn
      
      - name: Check application imports
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from app.main import app; print('✅ Application imports successfully')"

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:latest
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}
