name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: vano
          port: 3167
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/vano/catty-reminders-app
              chmod +x ./deploy.sh
              OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
              ./deploy.sh ghcr.io/$OWNER/${{ github.event.repository.name }} ${{ github.sha }}
            '
