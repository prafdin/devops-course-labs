name: Deploy

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: artem
          port: 3142
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/dev/catty-reminders-app

            git fetch origin
            git fetch --tags origin

            git checkout "${{ github.event.release.tag_name }}"

            DEPLOY_SHA=$(git rev-parse HEAD)
            printf "DEPLOY_REF=%s\n" "$DEPLOY_SHA" > .env

            sudo -n /usr/bin/systemctl restart app
            sudo -n /usr/bin/systemctl status app --no-pager
