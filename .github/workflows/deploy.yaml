name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3167
          username: vano
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "DEPLOY_REF=${{ github.sha }}" | sudo tee /tmp/deploy_ref.txt
            sudo docker pull ghcr.io/ivandelibaltov/catty-reminders-app:${{ github.sha }}
            sudo docker stop catty-app || true
            sudo docker rm catty-app || true
            sudo docker run -d --name catty-app -p 8181:8181 --restart always ghcr.io/ivandelibaltov/catty-reminders-app:${{ github.sha }}
            sleep 5
            if curl -s http://localhost:8181/login | grep -q "deployref"; then
              echo "Deployment complete"
            else
              exit 1
            fi
