name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.PROXY_HOST }}
          username: ${{ vars.SERVER_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,config.json"
          target: "/opt/catty-reminders"

      - name: Deploy via docker-compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.PROXY_HOST }}
          username: ${{ vars.SERVER_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/catty-reminders
            
            # Подготовка переменных
            OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
            DEPLOY_SHA="${{ github.sha }}"
            IMAGE="ghcr.io/$OWNER/catty-reminders-app:$DEPLOY_SHA"
            
            # Создаем .env на лету
            printf "IMAGE=%s\nDEPLOY_REF=%s\n" "$IMAGE" "$DEPLOY_SHA" > .env
            
            # Авторизация и запуск
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE"
            
            # Очистка старых контейнеров (чтобы избежать конфликтов имен)
            docker ps -aq --filter "name=catty" | xargs -r docker rm -f
            
            docker compose up -d --force-recreate --remove-orphans
