name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          port: 2200              # Ваш порт из ведомости
          username: vboxuser      # Ваш логин на ВМ
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/vboxuser/lab2/catty-reminders-app
            git pull origin main
            sudo systemctl restart catty
