name: CD - Deploy with Docker Compose

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.PROXY_HOST }}
          port: ${{ vars.SSH_PORT }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/catty-reminders

            # Приводим имя владельца к нижнему регистру (для GHCR)
            OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
            export DEPLOY_REF=${{ github.sha }}
            export IMAGE=ghcr.io/$OWNER/catty-reminders-app:${{ github.sha }}
            export APP_IMAGE=$IMAGE
            export DB_CONTAINER_NAME=catty-db
            export APP_CONTAINER_NAME=catty-app
            export MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            export MYSQL_USER=${{ secrets.MYSQL_USER }}
            export MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            export MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}

            # Логинимся в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Создаём или обновляем .env на сервере
            cat > .env <<EOF
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            MYSQL_USER=$MYSQL_USER
            MYSQL_PASSWORD=$MYSQL_PASSWORD
            MYSQL_DATABASE=$MYSQL_DATABASE
            DEPLOY_REF=$DEPLOY_REF
            APP_IMAGE=$APP_IMAGE
            EOF

            # Скачиваем новый образ (ждём его готовности до 5 минут)
            for i in {1..30}; do
              if docker pull $IMAGE; then
                echo "✅ Image pulled successfully"
                break
              fi
              echo "⏳ Waiting for image to be built... ($i/30)"
              sleep 10
            done

            # Перезапускаем стек
            docker compose --env-file .env up -d --force-recreate --remove-orphans

            sleep 5
            if curl -s --fail http://localhost:8181/login; then
              echo "✅ Deployment successful"
            else
              echo "❌ Failed"
              docker compose logs
              exit 1
            fi
