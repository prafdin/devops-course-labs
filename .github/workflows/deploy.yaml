name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: course.prafdin.ru
          username: artem
          port: 3142
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,config.json"
          target: "/home/artem/dev/catty-reminders-app"

      - name: Deploy via docker-compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: artem
          port: 3142
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e

            cd /home/artem/dev/catty-reminders-app

            OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
            DEPLOY_SHA="${{ github.sha }}"
            IMAGE="ghcr.io/$OWNER/catty-reminders-app:$DEPLOY_SHA"

            printf "IMAGE=%s\nDEPLOY_REF=%s\n" "$IMAGE" "$DEPLOY_SHA" > .env

            echo "Pulling image: $IMAGE"
            sudo -n docker pull "$IMAGE"
            sudo -n docker pull mysql:8

            sudo -n docker-compose down --remove-orphans || true
            sudo -n docker-compose up -d --force-recreate

            sudo -n docker-compose ps
