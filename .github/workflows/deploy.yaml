name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          chmod +x ./webhooks_handler/test.sh
          ./webhooks_handler/test.sh

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          key_path: /home/runner/.ssh/id_rsa
          script: |
            set -e
            cd /home/alex/3kurs/dev-ops/catty-reminders-app
            git fetch --all --tags
            git checkout --detach ${{ github.event.release.target_commitish }}
            chmod +x ./webhooks_handler/deploy.sh
            ./webhooks_handler/deploy.sh
