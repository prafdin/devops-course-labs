name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app via Docker
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3177
          username: andrey
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          script: |
            set -e
            cd ~/Desktop/DevOps_lab1/catty-reminders-app

            echo "DEPLOY_REF=${{ github.sha }}" > .env

            docker compose pull
            docker compose up -d

            echo "⏳ Waiting for application..."
            for i in {1..20}; do
              if curl -s http://localhost:8181/login 2>/dev/null | grep -q "deployref"; then
                echo "✅ Application is responding"
                break
              fi
              sleep 3
            done

            if ! curl -s http://localhost:8181/login 2>/dev/null | grep -q "deployref"; then
              echo "❌ Application failed health check"
              docker compose logs
              exit 1
            fi

            echo "=== Deployment completed successfully ==="
