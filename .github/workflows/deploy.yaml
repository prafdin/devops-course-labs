name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/alex/3kurs/dev-ops/catty-reminders-app
              OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
              export DEPLOY_REF=${{ github.sha }}
              export IMAGE=ghcr.io/$OWNER/${{ github.event.repository.name }}
              docker compose up -d --pull always --remove-orphans --force-recreate 
            '  
