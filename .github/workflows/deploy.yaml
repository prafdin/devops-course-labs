name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests before deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          chmod +x ./webhooks_handler/test.sh
          ./webhooks_handler/test.sh

      - name: Deploy release commit on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          key_path: ~/.ssh/id_rsa
          script: |
            set -e
            cd /home/alex/3kurs/dev-ops/catty-reminders-app
            git fetch --all --tags
            git checkout --detach ${{ github.sha }}
            chmod +x ./webhooks_handler/deploy.sh
            ./webhooks_handler/deploy.sh
