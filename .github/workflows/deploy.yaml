name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3169
          username: mappy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          script: |
            set -e

            cd /home/mappy/Desktop/catty-reminders-app

            echo "=== Деплой через Docker Compose ==="
            
            mkdir -p data

            echo "${{ secrets.DOCKER_PAT }}" | docker login ghcr.io -u mappy12 --password-stdin

            export DEPLOY_REF=${{ github.sha }}
            echo "DEPLOY_REF=${DEPLOY_REF}" > .env
            echo "=== DEPLOY_REF=${DEPLOY_REF} ==="
            cat .env

            docker compose down
            docker pull ghcr.io/mappy12/catty-reminders-app:${DEPLOY_REF}
            docker compose up -d

            sleep 3

            if docker compose ps | grep -q "Up"; then
              echo "Стек успешно запущен"
            else
              echo "Ошибка: стек не запустился"
              docker compose logs
              exit 1
            fi
            echo "=== Деплой успешно завершён ==="