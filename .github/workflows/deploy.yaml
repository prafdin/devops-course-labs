name: Continuous Deployment

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Resolve commit SHA from release tag
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.event.release.tag_name }}"
          echo "Resolving tag: $TAG"
          SHA=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/$TAG" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "Resolved SHA: $SHA"
          if ! [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: SHA is invalid: $SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Source Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy via Docker
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/catty-reminders-app
          IMAGE_TAG: ${{ steps.sha.outputs.sha }}
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh "$IMAGE_NAME" "$IMAGE_TAG"

      - name: Verify deployed deployref
        env:
          EXPECTED_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          sleep 4
          ACTUAL=$(curl -fsSL http://localhost:8181/login | grep -oE 'name="deployref"[^>]*content="[^"]+"' | sed -E 's/.*content="([^"]+)".*/\1/' | head -1)
          echo "Expected: $EXPECTED_SHA"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED_SHA" ]; then
            echo "::error::deployref mismatch"
            exit 1
          fi
