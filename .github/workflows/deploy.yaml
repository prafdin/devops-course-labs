name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3106
          script: |
            cd /home/vboxuser/catty-reminders-app
            git fetch --all
            git reset --hard ${{ github.sha }}
            echo "DEPLOY_REF=${{ github.sha }}" | sudo tee /etc/catty-app-env
            sudo systemctl restart catty-app
            sleep 3
            systemctl is-active --quiet catty-app && echo "SUCCESS" || echo "ERROR"
