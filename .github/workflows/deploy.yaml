name: 🚀 CD Auto-Deploy

on:
  release:
    types: [published]

jobs:
  deploy-to-vm:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📦 Fetch source code
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🛰️ Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          TARGET_DIR: /home/rover/catty-reminders-app
          SERVICE_NAME: catty-service
        with:
          host: course.prafdin.ru
          port: 3182  # например, 2215
          username: rover
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "🔥 Deployment started at $(date)"
            echo "📌 Commit: ${{ github.sha }}"

            # Создаём директорию
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR

            # Клонируем или обновляем репо
            if [ ! -d ".git" ]; then
              git clone git@github.com:Rovver52/catty-reminders-app.git .
            else
              git fetch origin
            fi

            git checkout ${{ github.sha }}
            git reset --hard HEAD

            # Установка зависимостей
            pip3 install --break-system-packages -r requirements.txt

            # Сохраняем метку деплоя
            echo "DEPLOY_REF=${{ github.sha }}" | sudo tee /tmp/deploy_ref.txt > /dev/null

            # Перезапуск сервиса
            echo "♻️ Restarting systemd service..."
            sudo systemctl daemon-reload
            sudo systemctl restart $SERVICE_NAME

            # Health check
            echo "⏳ Waiting for app to be ready..."
            for i in {1..20}; do
              if curl -sf http://localhost:8181/login | grep -qi "deployref\|login"; then
                echo "✅ App is healthy on port 8181"
                break
              fi
              sleep 3
            done

            echo "✨ Deployment finished successfully!"
