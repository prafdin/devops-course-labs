name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 2200
          username: rover
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment on VM..."

            # ✅ ИСПРАВЛЕНО: правильный путь (~ уже = /home/rover)
            DEPLOY_DIR=~/catty-reminders-app
            COMMIT_SHA="${{ github.sha }}"

            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            echo "📦 Deploying commit: $COMMIT_SHA"

            if [ -d ".git" ]; then
              git fetch origin
            else
              # ✅ ИСПРАВЛЕНО: HTTPS вместо SSH (нет ключей на ВМ)
              git clone https://github.com/Rovver52/catty-reminders-app.git .
            fi

            git checkout --detach $COMMIT_SHA
            git reset --hard $COMMIT_SHA

            # Установка зависимостей
            pip3 install --break-system-packages -r requirements.txt

            # ✅ ИСПРАВЛЕНО: запись в файл без sudo
            echo "DEPLOY_REF=$COMMIT_SHA" > .env.deploy

            # ✅ ИСПРАВЛЕНО: перезапуск приложения без sudo (через pkill + nohup)
            echo "🔄 Restarting application..."
            
            # Останавливаем старый процесс
            pkill -f "uvicorn.*8181" || true
            sleep 2
            
            # Запускаем новое приложение
            nohup python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8181 > app.log 2>&1 &
            
            sleep 3

            # Проверка запуска
            if curl -s http://localhost:8181/login | grep -q "deployref"; then
              echo "✅ Application is running on port 8181"
            else
              echo "❌ Application failed to start"
              echo "=== App log ==="
              tail -20 app.log || true
              exit 1
            fi

            echo "✅ Deployment complete!"
