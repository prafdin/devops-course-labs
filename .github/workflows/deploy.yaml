name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: course.prafdin.ru
          username: artem
          port: 3142
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,config.json"
          target: "/home/artem/dev/catty-reminders-app"

      - name: Deploy via docker-compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: artem
          port: 3142
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e

            cd /home/artem/dev/catty-reminders-app

            OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
            DEPLOY_SHA="${{ github.sha }}"
            IMAGE="ghcr.io/$OWNER/catty-reminders-app:$DEPLOY_SHA"

            printf "IMAGE=%s\nDEPLOY_REF=%s\n" "$IMAGE" "$DEPLOY_SHA" > .env

            echo "Pulling image: $IMAGE"
            sudo -n docker pull "$IMAGE"
            sudo -n docker pull mysql:8

            echo "Cleaning old catty containers"
            sudo -n docker ps -aq --filter "name=catty" | xargs -r sudo -n docker rm -f

            echo "Cleaning old compose network"
            sudo -n docker network rm catty-reminders-app_default || true

            echo "Starting compose stack"
            sudo -n docker-compose up -d --force-recreate --remove-orphans

            sudo -n docker-compose ps
