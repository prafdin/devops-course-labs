name: CD - Deploy to Debian

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: vboxuser
          port: 2200
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/catty-reminders-app
            
            git fetch origin
            git checkout ${{ github.sha }}

            docker build -t catty-app:latest .

            docker stop catty-app-container || true
            docker rm catty-app-container || true

            sudo fuser -k 8181/tcp || true

            docker run -d \
              --name catty-app-container \
              -p 8181:8181 \
              --restart always \
              catty-app:latest

            sleep 10
            if [ "$(docker inspect -f '{{.State.Running}}' catty-app-container)" == "true" ]; then
              echo "Deployment successful! Container is running."
            else
              echo "Deployment failed! Container log output:"
              docker logs catty-app-container
              exit 1
            fi
