name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.PROXY }}
          port: ${{ vars.SSH_PORT }}
          username: ${{ vars.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/deemeed/catty-reminders-app
            chmod +x deploy.sh
            ./deploy.sh ${{ github.sha }}