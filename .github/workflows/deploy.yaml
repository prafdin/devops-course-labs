name: Deploy
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Image Name
        id: prep
        run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create .env file
        run: |
          echo "APP_IMAGE=ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest" > .env
          echo "DEPLOY_REF=${{ github.sha }}" >> .env
          echo "APP_PORT=8181" >> .env
          echo "APP_CONTAINER_NAME=catty-app" >> .env
          echo "DB_CONTAINER_NAME=catty_db" >> .env
          echo "MYSQL_ROOT_PASSWORD=mypass" >> .env
          echo "MYSQL_USER=user" >> .env
          echo "MYSQL_PASSWORD=mypass" >> .env
          echo "MYSQL_DATABASE=catty_reminders" >> .env
          echo "DB_PORT=3306" >> .env

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: course.prafdin.ru
          username: ilya
          port: 3120
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Мы копируем именно .yaml
          source: ".env,docker-compose.yaml,config.json"
          target: "/home/ilya/catty-compose"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: ilya
          port: 3120
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ilya/catty-compose
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Явно указываем файл через -f на случай, если docker ищет .yml
            docker compose -f docker-compose.yaml down --remove-orphans || true
            docker compose -f docker-compose.yaml pull
            docker compose -f docker-compose.yaml up -d
            docker image prune -f
