name: CD Pipeline

on:
  release:
    types: [published, created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: vano
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3167
          script: |
            cd /home/vano/catty-reminders-app
            chmod +x deploy.sh
            ./deploy.sh ${{ github.sha }}
