name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Execute deployment script
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          GHCR_USER: only-hell
        run: |
          chmod +x ~/catty-reminders-app/deploy.sh
          ~/catty-reminders-app/deploy.sh ${{ github.event.workflow_run.head_sha }}
