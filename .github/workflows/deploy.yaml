name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (tag/branch/sha)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run deploy.sh
        run: |
          cd "$HOME/catty-reminders-app"
          chmod +x ./deploy.sh
          ./deploy.sh "${{ steps.ref.outputs.ref }}"
