name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy via script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: vano
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3167
          script: bash ~/catty-reminders-app/deploy.sh ${{ github.sha }}
