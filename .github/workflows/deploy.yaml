# Workflow для автоматического развёртывания при создании релиза
name: Deploy
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Подключение к серверу по SSH и выполнение команд
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: ilya
          port: 3117
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/ilya/catty-reminders-app
              # Приводим имя владельца репозитория к нижнему регистру (для GHCR)
              OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
              
              export DEPLOY_REF=${{ github.sha }}
              export IMAGE=ghcr.io/$OWNER/catty-reminders-app:${{ github.sha }}
              
              # Переменные окружения для базы данных и приложения
              export DB_CONTAINER_NAME=catty-db
              export APP_CONTAINER_NAME=catty-app
              export MARIADB_ROOT_PASSWORD=mypass
              export MARIADB_USER=ilya
              export MARIADB_PASSWORD=mypass
              export MARIADB_DATABASE=catty_reminders
              export HOST_DB_PORT=3306
              export CONTEINER_DB_PORT=3306
              export HOST_APP_PORT=8181
              export CONTEINER_APP_PORT=8181

              # Логинимся в GitHub Container Registry
              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
              # Запускаем (или обновляем) стек Docker Compose
              docker compose up -d --pull always --remove-orphans --force-recreate 
            '
