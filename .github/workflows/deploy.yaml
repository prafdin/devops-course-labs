name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app via Docker
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3169
          username: mappy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          script: |
            set -e

            IMAGE_NAME="ghcr.io/mappy12/catty-reminders-app:lab3"
            CONTAINER_NAME="catty-app"

            echo "=== Деплой через Docker контейнер ==="

            echo "${{ secrets.DOCKER_PAT }}" | docker login ghcr.io -u mappy12 --password-stdin

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker pull $IMAGE_NAME

            docker run -d \
              --name $CONTAINER_NAME \
              --restart always \
              -p 8181:8181 \
              $IMAGE_NAME

            sleep 3
            if docker ps | grep -q $CONTAINER_NAME; then
              echo "Контейнер успешно запущен"

            else
              echo "Ошибка: контейнер не запустился"
              docker logs $CONTAINER_NAME || true
              exit 1
            fi

            echo "=== Деплой успешно завершен ==="
