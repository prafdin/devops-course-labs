- name: Deploy to server
  uses: appleboy/ssh-action@v1
  with:
    host: course.prafdin.ru
    port: 3113
    username: hesa
    key: ${{ secrets.SSH_PRIVATE_KEY }}
    pty: true
    script: |
      cd /home/hesa/catty-reminders-app
      git fetch --all
      git reset --hard ${{ github.sha }}
      echo "DEPLOY_REF=${{ github.sha }}" | sudo tee /etc/catty-app-env
      sudo /usr/bin/systemctl restart catty
