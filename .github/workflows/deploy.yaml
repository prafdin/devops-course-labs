name: CD - Deploy to Server

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy application files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.PROXY_HOST }}
          port: ${{ vars.SSH_PORT }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/catty-reminders/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.PROXY_HOST }}
          port: ${{ vars.SSH_PORT }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e  # прерывать при ошибке
            cd /opt/catty-reminders

            # Активируем виртуальное окружение, если есть
            if [ -d "venv" ]; then
              source venv/bin/activate
              PIP_CMD="pip"
            else
              PIP_CMD="pip3"
            fi

            # Устанавливаем зависимости (с флагом для новых Ubuntu, если нет venv)
            if [ "$PIP_CMD" = "pip3" ]; then
              $PIP_CMD install --break-system-packages -r requirements.txt
            else
              $PIP_CMD install -r requirements.txt
            fi

            # Записываем SHA в .deploy_ref (с правами sudo, чтобы гарантировать запись)
            echo "DEPLOY_REF=${{ github.sha }}" | sudo tee .deploy_ref > /dev/null

            # Перезапускаем сервис (sudo без пароля требуется)
            sudo systemctl restart catty-reminders

            sleep 3

            if curl -s --fail http://localhost:8181/login; then
              echo "✅ Application restarted successfully"
            else
              echo "❌ Application failed to start"
              sudo journalctl -u catty-reminders -n 20 --no-pager
              exit 1
            fi

      - name: Verify external access
        run: |
          sleep 5
          curl -s --fail "http://app.${{ vars.ID }}.${{ vars.PROXY_HOST }}/login" || exit 1
          echo "✅ Application is accessible at http://app.${{ vars.ID }}.${{ vars.PROXY_HOST }}"
