name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/rover/catty-reminders-app
            chmod +x ./deploy.sh
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u rovver52 --password-stdin
            ./deploy.sh "ghcr.io/rovver52/catty-reminders-app&quot; "${{ github.sha }}"
