name: 🚀 CD Auto-Deploy

on:
  release:
    types: [published]

jobs:
  deploy-to-vm:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📦 Fetch source code
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🛰️ Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3182  # ⚠️ ЗАМЕНИ на порт из ведомости
          username: rover
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # Твои параметры
            TARGET_DIR="/home/rover/catty-reminders-app"
            VENV_DIR="/home/rover/catty-reminders-app/venv"
            SERVICE_NAME="catty-app"
            GITHUB_SHA="${{ github.sha }}"

            echo "🔥 Deployment started at $(date)"
            echo "📌 Commit: $GITHUB_SHA"

            cd "$TARGET_DIR"

            # Сохраняем текущую ветку
            git fetch origin
            git checkout "$GITHUB_SHA"
            git reset --hard HEAD

            # Активируем venv и устанавливаем зависимости
            echo "📦 Installing dependencies in virtual environment..."
            source "$VENV_DIR/bin/activate"
            pip install -r requirements.txt

            # Сохраняем метку деплоя
            echo "DEPLOY_REF=${GITHUB_SHA}" | sudo tee /tmp/deploy_ref.txt > /dev/null

            # Перезапуск сервиса
            echo "♻️ Restarting systemd service..."
            sudo systemctl daemon-reload
            sudo systemctl restart "$SERVICE_NAME"

            # Health check
            echo "⏳ Waiting for app to be ready..."
            for i in {1..20}; do
              if curl -sf http://localhost:8181/login | grep -qi "login\|catty"; then
                echo "✅ App is healthy on port 8181"
                break
              fi
              sleep 3
            done

            echo "✨ Deployment finished successfully!"
