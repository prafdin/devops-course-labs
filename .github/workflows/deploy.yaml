name: Deploy
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: dima
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3105
          script: bash /home/dima/devops/catty-reminders-app/run_app.sh ${{ github.sha }}
