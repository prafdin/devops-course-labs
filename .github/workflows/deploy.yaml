name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
  
    steps:
      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3169
          username: mappy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/mappy/Desktop/catty-reminders-app"
            ENV_FILE="$APP_DIR/.env"
            BRANCH="${{ github.ref_name }}"
            LOG_FILE="/home/mappy/webhook/deploy.log"
            
            log() {
              echo "$(date '+%Y-%m-%d %H:%M:%S') - $1" | tee -a $LOG_FILE
            }
            
            log "НАЧАЛО ДЕПЛОЯ (GitHub Actions CD)"
            log "Ветка: $BRANCH"

            cd $APP_DIR

            log "Обновление кода..."
            git fetch origin
            git checkout $BRANCH
            git reset --hard origin/$BRANCH

            DEPLOY_REF=$(git rev-parse HEAD)
            log "SHA коммита: $DEPLOY_REF"
          
            echo "DEPLOY_REF=$DEPLOY_REF" > $ENV_FILE
      
            log "Перезапуск приложения..."
            sudo systemctl restart app
              
            log "=== ДЕПЛОЙ ДЛЯ ВЕТКИ $BRANCH УСПЕШНО ЗАВЕРШЕН ==="

