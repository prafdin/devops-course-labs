name: Deploy
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: rover
          port: 3182
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/rover/catty-reminders-app
            
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            export DEPLOY_REF=${{ github.sha }}
            
            echo "DB_CONTAINER_NAME=catty-db" > .env
            echo "MARIADB_ROOT_PASSWORD=mypass" >> .env
            echo "MARIADB_USER=root" >> .env
            echo "MARIADB_PASSWORD=mypass" >> .env
            echo "MARIADB_DATABASE=catty_reminders" >> .env
            echo "HOST_DB_PORT=3306" >> .env
            echo "CONTAINER_DB_PORT=3306" >> .env
            echo "APP_CONTAINER_NAME=catty-reminders-app" >> .env
            echo "IMAGE=ghcr.io/${OWNER}/catty-reminders-app:latest" >> .env
            echo "DEPLOY_REF=latest" >> .env
            echo "HOST_APP_PORT=8181" >> .env
            echo "CONTAINER_APP_PORT=8181" >> .env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose up -d --pull always --remove-orphans --force-recreate
