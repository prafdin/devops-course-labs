name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remote Docker Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: ilya
          port: 3120
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              # Переходим в папку проекта
              cd /home/ilya/catty-reminders-app

              # Определяем переменные
              OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
              REPO=$(echo "${{ github.event.repository.name }}" | tr "[:upper:]" "[:lower:]")

              export IMAGE="ghcr.io/$OWNER/$REPO:latest&quot;
              export DEPLOY_REF="${{ github.sha }}"

              # Переменные окружения для docker-compose
              export DB_CONTAINER_NAME=catty-db
              export APP_CONTAINER_NAME=catty-app
              export MARIADB_ROOT_PASSWORD=mypass
              export MARIADB_USER=ilya
              export MARIADB_PASSWORD=mypass
              export MARIADB_DATABASE=catty_reminders
              export HOST_DB_PORT=3306
              export CONTEINER_DB_PORT=3306
              export HOST_APP_PORT=8181
              export CONTEINER_APP_PORT=8181

              # Авторизация в реестре
              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

              # ОБНОВЛЕНИЕ:
              # 1. Скачиваем только новый образ приложения
              docker compose pull catty-app

              # 2. Перезапускаем только приложение. 
              # --no-deps гарантирует, что зависимый сервис (db) не будет перезапущен.
              # --force-recreate заставит приложение прочитать новый DEPLOY_REF.
              docker compose up -d --no-deps --force-recreate catty-app

              # Чистим старые образы, чтобы не забивать место
              docker image prune -f
            '
