name: Debug SSH key (safe)
  run: |
    echo "=== CHECK KEY PRESENCE ==="

    if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
      echo "KEY IS EMPTY"
      exit 1
    fi

    echo "KEY EXISTS"

    echo "=== KEY STATS ==="
    echo "${{ secrets.SSH_PRIVATE_KEY }}" | wc -c

    echo "=== KEY START ==="
    echo "${{ secrets.SSH_PRIVATE_KEY }}" | head -c 40
    echo ""

    echo "=== KEY END ==="
    echo "${{ secrets.SSH_PRIVATE_KEY }}" | tail -c 40
