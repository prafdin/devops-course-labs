name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3169
          username: mappy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          script: |
            set -e

            cd /home/mappy/Desktop/catty-reminders-app

            echo "=== Деплой через Docker Compose ==="

            echo "${{ secrets.DOCKER_PAT }}" | docker login ghcr.io -u mappy12 --password-stdin

            docker compose down || true

            docker compose pull
            docker compose up -d

            sleep 3

            if docker compose ps | grep -q "Up"; then
              echo "Стек успешно запущен"
            else
              echo "Ошибка: стек не запустился"
              docker compose logs
              exit 1
            fi
            echo "=== Деплой успешно завершён ==="
