name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          port: 2200
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Starting deployment ==="
            cd /home/vboxuser/lab2/catty-reminders-app
            echo "Fetching latest code..."
            git fetch origin
            git reset --hard origin/Lab2
            echo "Current commit: $(git log -1 --oneline)"
            echo "Installing dependencies..."
            source venv/bin/activate
            pip install -r requirements.txt
            echo "Stopping old process..."
            pkill -f "uvicorn.*8181" || true
            echo "Starting new process..."
            nohup uvicorn app.main:app --host 0.0.0.0 --port 8181 > app.log 2>&1 &
            sleep 3
            echo "Checking if process is running..."
            pgrep -f "uvicorn.*8181" && echo "Process is running" || echo "Process not found"
            echo "Testing local endpoint..."
            curl -s http://localhost:8181 | head -c 200
            echo ""
            echo "=== Deployment completed ==="
