name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3177
          username: andrey
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment on VM..."

            DEPLOY_DIR=~/Desktop/DevOps_lab1/catty-reminders-app
            COMMIT_SHA="${{ github.sha }}"
            IMAGE_NAME="ghcr.io/andreypreobrazhenskiy/catty-reminders-app/catty-app"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "📦 Pulling image: $IMAGE_NAME:$COMMIT_SHA"
            docker pull $IMAGE_NAME:$COMMIT_SHA

            echo "🛑 Stopping old container..."
            docker stop catty-app 2>/dev/null || true
            docker rm catty-app 2>/dev/null || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name catty-app \
              --restart unless-stopped \
              -p 8181:8181 \
              -e DEPLOY_REF=$COMMIT_SHA \
              $IMAGE_NAME:$COMMIT_SHA

            sleep 5

            if curl -s http://localhost:8181/login | grep -q "deployref"; then
              echo "✅ Application is running in Docker on port 8181"
            else
              echo "❌ Application failed to start"
              docker logs catty-app
              exit 1
            fi

            echo "✅ Docker deployment complete!"
