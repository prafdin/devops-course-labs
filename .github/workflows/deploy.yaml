name: Deploy
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: rover
          port: 3182
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/rover/catty-reminders-app
              cat > .env << EOF
DB_CONTAINER_NAME=catty-db
MARIADB_ROOT_PASSWORD=mypass
MARIADB_USER=rover
MARIADB_PASSWORD=mypass
MARIADB_DATABASE=catty_reminders
HOST_DB_PORT=3306
CONTAINER_DB_PORT=3306
APP_CONTAINER_NAME=catty-app
IMAGE=ghcr.io/${{ github.repository_owner | lower }}/catty-reminders-app:${{ github.sha }}
DEPLOY_REF=${{ github.sha }}
HOST_APP_PORT=8181
CONTAINER_APP_PORT=8181
EOF
              OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
              export DEPLOY_REF=${{ github.sha }}
              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
              docker compose up -d --pull always --remove-orphans --force-recreate
            '
