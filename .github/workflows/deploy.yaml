name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Устанавливаем SSH ключ для доступа к VM
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      # 3. Добавляем хост в known_hosts
      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 3132 course.prafdin.ru >> ~/.ssh/known_hosts
      
      # 4. Подключаемся по SSH и выполняем обновление (как в webhook)
      - name: Deploy on server
        run: |
          ssh -p 3132 nyanya@course.prafdin.ru << 'EOF'
            cd /opt/catty-reminders
            git fetch origin
            git reset --hard origin/lab2
            /opt/catty-reminders/venv/bin/pip install -r requirements.txt            
            sudo systemctl restart catty-reminders
            echo "Deployment completed successfully!"
          EOF
