name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: password-123
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3121
          script: |
            cd ~/catty-reminders-app
            
            # Логинимся в GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Пуллим новый образ
            docker pull ghcr.io/sofiastepanova/catty-reminders-app:${{ github.sha }}
            
            # Останавливаем и удаляем старый контейнер (если есть)
            docker stop catty-app || true
            docker rm catty-app || true
            
            # Запускаем новый контейнер
            docker run -d \
              --name catty-app \
              --restart always \
              -p 8181:8181 \
              ghcr.io/sofiastepanova/catty-reminders-app:${{ github.sha }}
