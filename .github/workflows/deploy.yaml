name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: vano
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3167
          script: |
            cd /home/vano/catty-app
            git fetch origin
            git reset --hard origin/lab2
            NEW_REF=$(git rev-parse HEAD)
            echo "DEPLOY_REF=$NEW_REF" | sudo tee /etc/catty-app-env
            sudo systemctl restart catty
