name: Deploy

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy container to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: artem
          port: 3142
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/dev/catty-reminders-app

            DEPLOY_SHA="${{ github.sha }}"
            printf "DEPLOY_REF=%s\n" "$DEPLOY_SHA" > .env

            sudo -n /usr/bin/docker pull ghcr.io/artem362a/catty-reminders-app:${{ github.sha }}

            sudo -n /usr/bin/docker stop catty || true
            sudo -n /usr/bin/docker rm catty || true

            sudo -n /usr/bin/docker run -d \
              --name catty \
              --restart always \
              --env-file .env \
              -p 8181:8181 \
              ghcr.io/artem362a/catty-reminders-app:${{ github.sha }}

            sudo -n /usr/bin/docker ps
