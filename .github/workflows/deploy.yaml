name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2200
          script: |
            cd /home/vboxuser/devops-lab/catty-reminders-app
            git fetch --all
            git reset --hard origin/lab2
            source venv/bin/activate
            pip install -r requirements.txt
            echo "DEPLOY_REF=$(git rev-parse HEAD)" > .env
            sudo systemctl restart app.service
