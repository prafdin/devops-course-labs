name: CD - Deploy to Server (Docker)

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          port: 3106
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            IMAGE_NAME="ghcr.io/vichurinnik/catty-reminders-app:latest"
            CONTAINER_NAME="catty-app"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker pull $IMAGE_NAME

            docker run -d --name $CONTAINER_NAME -p 8181:8181 --restart unless-stopped \
              -e DEPLOY_REF="${{ github.sha }}" \
              $IMAGE_NAME

            sleep 3
            if curl -s --fail http://localhost:8181/login; then
              echo "✅ Docker container started successfully"
            else
              echo "❌ Application failed to start"
              docker logs $CONTAINER_NAME
              exit 1
            fi

      - name: Verify external access
        run: |
          sleep 5
          curl -s --fail "http://app.vichurin.course.prafdin.ru/login" || exit 1
          echo "✅ Application is accessible at http://app.vichurin.course.prafdin.ru"
