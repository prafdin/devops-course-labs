name: Deploy Workflow

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            
            docker pull ghcr.io/yui1337/catty-reminders-app:${{ github.sha }}
            
            docker stop catty-app || true
            docker rm catty-app || true
            
            docker run -d \
              --name catty-app \
              -p 8181:8181 \
              -e DEPLOY_REF=${{ github.sha }} \
             ghcr.io/yui1337/catty-reminders-app:${{ github.sha }}
            
            echo "> Success!"
