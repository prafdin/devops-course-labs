name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no -p 3132 nyanya@course.prafdin.ru << EOF
            set -e
            cd /opt/catty-reminders
            git fetch origin --tags
            git reset --hard ${{ github.sha }}
            echo "${{ github.sha }}" | sudo tee /opt/catty-reminders/deploy_ref.txt
            /opt/catty-reminders/venv/bin/pip install -r requirements.txt
            sudo systemctl restart catty-reminders
            echo "Deployed: ${{ github.sha }}"
          EOF
