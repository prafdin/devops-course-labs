name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 2200
          username: rover
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment on VM..."

            DEPLOY_DIR=~/catty-reminders-app
            COMMIT_SHA="${{ github.sha }}"

            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            echo "📦 Deploying commit: $COMMIT_SHA"

            if [ -d ".git" ]; then
              git fetch origin
            else
              git clone https://github.com/Rovver52/catty-reminders-app.git .
            fi

            git checkout --detach $COMMIT_SHA
            git reset --hard $COMMIT_SHA

            pip3 install --break-system-packages -r requirements.txt

            echo "DEPLOY_REF=$COMMIT_SHA" > .env.deploy

            # ✅ БЕЗОПАСНЫЙ перезапуск приложения
            echo "🔄 Stopping old application..."
            
            # Находим PID процесса и убиваем только его
            APP_PID=$(lsof -t -i:8181 2>/dev/null || true)
            if [ -n "$APP_PID" ]; then
              echo "Found app running on PID: $APP_PID"
              kill $APP_PID || true
              sleep 2
            fi
            
            echo "🚀 Starting new application..."
            
            # Запускаем приложение в фоне с перенаправлением вывода
            nohup python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8181 > app.log 2>&1 &
            NEW_PID=$!
            
            echo "Application started with PID: $NEW_PID"
            
            # Ждем немного и проверяем
            sleep 5
            
            # Проверяем, что процесс еще жив
            if ps -p $NEW_PID > /dev/null 2>&1; then
              echo "✅ Application process is running"
            else
              echo "❌ Application process died"
              echo "=== App log ==="
              cat app.log
              exit 1
            fi

            # Проверяем доступность приложения
            if curl -s http://localhost:8181/login | grep -q "deployref"; then
              echo "✅ Application is responding on port 8181"
            else
              echo "⚠️  Application running but /login check failed"
              echo "Response:"
              curl -s http://localhost:8181/login || true
            fi

            echo "✅ Deployment complete!"
