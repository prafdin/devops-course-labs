name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to production server
        run: |
          ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
              set -e
              cd /home/pyshisha/devops-lab/catty-reminders-app

              git fetch --all --tags --prune
              git reset --hard ${{ github.sha }}

              source /home/pyshisha/devops-lab/venv/bin/activate
              pip install -r requirements.txt

              COMMIT=\$(git rev-parse HEAD)
              echo "DEPLOY_REF=${{ github.sha }}" | sudo tee /home/pyshisha/devops-lab/catty-reminders-app/.deploy.env

              sudo systemctl restart catty-app

              sleep 5
              echo "Deployed commit: \$COMMIT"
          EOF

      - name: Verify deployment
        run: |
          sleep 5
          curl -s http://app.ryzkov.course.prafdin.ru/login | grep "deployref"
