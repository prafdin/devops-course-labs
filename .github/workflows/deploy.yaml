name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests before deploy
        run: |
          chmod +x ./webhooks_handler/test.sh
          ./webhooks_handler/test.sh

      - name: Load SSH key
        id: sshkey
        run: |
          echo "KEY<<EOF" >> $GITHUB_OUTPUT
          cat <<EOF >> $GITHUB_OUTPUT
${{ secrets.SSH_PRIVATE_KEY }}
EOF
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy release commit on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ steps.sshkey.outputs.KEY }}
          script: |
            set -e
            cd /home/alex/3kurs/dev-ops/catty-reminders-app
            git fetch --all --tags
            git checkout --detach ${{ github.event.release.target_commitish }}
            chmod +x ./webhooks_handler/deploy.sh
            ./webhooks_handler/deploy.sh
