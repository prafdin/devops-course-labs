name: CD Workflow
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: ilya
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3120
          debug: true
          script_stop: true
          script: |
            # Переходим в папку проекта
            cd ~/catty-reminders-app
            
            # Обновляем код из нужной ветки
            git fetch origin lab2
            git reset --hard origin/lab2
            
            # Устанавливаем зависимости
            pip install -r requirements.txt
            
            # 1. Убиваем старый обработчик вебхуков (елси запущен)
            pkill -f "webhook_handler.py" || true
            
            # 2. Убиваем старое запущенное приложение
            pkill -f "app.main" || true
            
            # 3. Запускаем приложение в фоне
            # Используем </dev/null для корректного закрытия SSH-сессии
            nohup python3 -m app.main --port 8181 </dev/null > deploy.log 2>&1 &
            
            # Даем 3 секунды на запуск и проверяем процесс
            sleep 3
            ps aux | grep "app.main" | grep -v grep
            echo "Deployment finished successfully!"
