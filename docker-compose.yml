services:
  app:
    image: ghcr.io/andreypreobrazhenskiy/catty-reminders-app:${DEPLOY_REF}
    ports:
      - "8181:8181"
    environment:
      - DEPLOY_REF=${DEPLOY_REF}
    volumes:
      - ./config.json:/catty-reminders-app/config.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    pull_policy: always

  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: mypass
      MARIADB_DATABASE: catty_reminders
      MARIADB_USER: user
      MARIADB_PASSWORD: mypass
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
