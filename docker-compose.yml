services:
  app:
    image: ghcr.io/andreypreobrazhenskiy/catty-reminders-app:${DEPLOY_REF}
    ports:
      - "8181:8181"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/cattydb
      - DEPLOY_REF=${DEPLOY_REF}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    pull_policy: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: cattydb
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cattydb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
