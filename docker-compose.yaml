name: catty

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: catty_reminders
      MARIADB_USER: catty
      MARIADB_PASSWORD: cattypass
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - catty-db-data:/var/lib/mysql

  app:
    image: ${IMAGE_NAME:-ghcr.io/dmitrievsn/catty-reminders-app}:${IMAGE_TAG:-lab4}
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8181:8181"
    environment:
      DEPLOY_REF: ${DEPLOY_REF:-NA}

volumes:
  catty-db-data:
