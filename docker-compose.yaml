version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: mypass
      MARIADB_DATABASE: catty_reminders
    volumes:
      - mariadb_data:/var/lib/mysql

  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "8181:8181"
    environment:
      - DEPLOY_REF=${IMAGE_TAG}
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=mypass
      - DB_NAME=catty_reminders
    depends_on:
      - db

volumes:
  mariadb_data: