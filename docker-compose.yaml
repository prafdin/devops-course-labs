services:
  catty-app:
    image: ${APP_IMAGE}
    container_name: ${APP_CONTAINER_NAME}
    restart: always
    environment:
      - DEPLOY_REF=${DEPLOY_REF}
    ports:
      - "8181:8181"
    volumes:
      - ./config.json:/catty-reminders-app/config.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - catty-network

  db:
    image: mysql:latest
    container_name: ${DB_CONTAINER_NAME}
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - catty-network

networks:
  catty-network:
    driver: bridge

volumes:
  db_data:
