services:
  app:
    image: ghcr.io/mappy12/catty-reminders-app:${DEPLOY_REF}
    ports:
      - "8181:8181"
    environment:
      - DEPLOY_REF=${DEPLOY_REF}
    volumes:
      - ./config.json:/catty-reminders-app/config.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    pull_policy: always

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: userpass
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
      MYSQL_DATABASE: catty_reminders

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -puserpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
