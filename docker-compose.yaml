services:
  db:
    image: mysql:8
    container_name: catty-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catty
      MYSQL_USER: catty
      MYSQL_PASSWORD: catty
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build: .
    image: ghcr.io/artem362a/catty-reminders-app:${IMAGE_TAG:-lab4}
    container_name: catty-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      DEPLOY_REF: ${DEPLOY_REF:-NA}
    volumes:
      - ./config.json:/app/config.json:ro

volumes:
  db_data:
