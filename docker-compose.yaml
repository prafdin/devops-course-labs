services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reminders
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: ghcr.io/only-hell/catty-reminders-app:${IMAGE_TAG:-lab4}
    restart: always
    ports:
      - "8182:8181"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/reminders
    depends_on:
      - db

volumes:
  db_data:
