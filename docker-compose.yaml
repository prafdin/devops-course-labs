services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: reminders
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - catty_db_data:/var/lib/mysql
    networks:
      - catty-network

  app:
    build: .
    image: ghcr.io/impulse-lab-crypto/catty-reminders-app:latest
    restart: always
    ports:
      - "8181:8181"
    environment:
      # Настройка подключения к MySQL
      DATABASE_URL: mysql+mysqlconnector://user:password@db/reminders
      DEPLOY_REF: ${GITHUB_SHA:-local}
    depends_on:
      - db
    networks:
      - catty-network

networks:
  catty-network:
    driver: bridge

volumes:
  catty_db_data:
