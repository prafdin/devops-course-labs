name: catty-reminders

services:
  app:
    build: .
    image: ghcr.io/mappy12/catty-reminders-app:${DEPLOY_REF:-latest}
    container_name: catty-app
    ports:
      - "8181:8181"
    environment:
      - DEPLOY_REF=${DEPLOY_REF:-development}
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: catty-db
    environment:
      MYSQL_USER: user
      MYSQL_ROOT_PASSWORD: userpass
      MYSQL_DATABASE: catty_reminders
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data:
