version: '3.8'

services:
  db:
    image: mariadb:11.8.6-ubi9
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=mypass
      - MARIADB_DATABASE=catty_reminders
    ports:
      - 3306:3306
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - catty-network

  app:
    image: ghcr.io/yui1337/catty-reminders-app:${IMAGE_TAG}
    restart: always
    ports:
      - "8181:8181"
    environment:
      - DEPLOY_REF=${IMAGE_TAG}
    volumes:
      - ./config.json:/catty-reminders-app/config.json:ro
    depends_on:
      - db
    networks:
      - catty-network

networks:
  catty-network:
    driver: bridge

volumes:
  mariadb_data:
