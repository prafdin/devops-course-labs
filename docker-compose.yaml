services:
  db:
    image: mariadb:11
    container_name: ${DB_CONTAINER_NAME}
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
    ports:
      - "${HOST_DB_PORT}:${CONTEINER_DB_PORT}"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - catty-network

  catty-app:
    image: ${IMAGE}
    container_name: ${APP_CONTAINER_NAME}
    restart: always
    environment:
      - DEPLOY_REF=${DEPLOY_REF}
      - DB_HOST=catty-db
    ports:
      - "${HOST_APP_PORT}:${CONTEINER_APP_PORT}"
    volumes:
      - ./config.json:/catty/config.json:ro
    depends_on:
      - db
    networks:
      - catty-network

networks:
  catty-network:
    driver: bridge

volumes:
  db_data: